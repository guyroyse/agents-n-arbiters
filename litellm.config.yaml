model_list:
  # Primary model
  - model_name: primary
    litellm_params:
      model: gpt-4.1
      api_key: os.environ/OPENAI_API_KEY

  # Mini model
  - model_name: mini
    litellm_params:
      model: gpt-4.1-mini
      api_key: os.environ/OPENAI_API_KEY

  # Embedding model
  - model_name: embedding
    litellm_params:
      model: text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
