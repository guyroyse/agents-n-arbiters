model_list:
  # Primary model
  - model_name: primary
    litellm_params:
      model: os.environ/PRIMARY_DEPLOYMENT_NAME
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_version: '2024-10-21'

  # Mini model
  - model_name: mini
    litellm_params:
      model: os.environ/MINI_DEPLOYMENT_NAME
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_version: '2024-10-21'

  # Embedding model
  - model_name: embedding
    litellm_params:
      model: os.environ/EMBEDDING_DEPLOYMENT_NAME
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_version: '2024-10-21'
